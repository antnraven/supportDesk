services:

  # ─── Infrastructure ───────────────────────────────────────────────

  postgres:
    container_name: support-desk-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: support_desk
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - support-desk-net

  minio:
    container_name: support-desk-minio
    image: quay.io/minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - support-desk-net

  zookeeper:
    container_name: support-desk-zookeeper
    image: confluentinc/cp-zookeeper:latest
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - support-desk-net

  kafka:
    container_name: support-desk-kafka
    image: confluentinc/cp-kafka:latest
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - support-desk-net

  keycloak:
    container_name: support-desk-keycloak
    image: quay.io/keycloak/keycloak:latest
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/support_desk
      KC_DB_USERNAME: ${PG_USER:-postgres}
      KC_DB_PASSWORD: ${PG_PASSWORD:-postgres}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8089:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - support-desk-net

  # ─── Application Services ─────────────────────────────────────────

  user-service:
    container_name: support-desk-user-service
    build:
      context: ./userService
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/support_desk
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      GRPC_SERVER_PORT: 9090
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/support-desk
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - support-desk-net

  image-service:
    container_name: support-desk-image-service
    build:
      context: ./imageService
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/support_desk
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      GRPC_SERVER_PORT: 9091
      MINIO_URL: http://minio:9000
      ACCESS_KEY: ${ACCESS_KEY:-minioadmin}
      SECRET_KEY: ${SECRET_KEY:-minioadmin}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/support-desk
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - support-desk-net

  incident-service:
    container_name: support-desk-incident-service
    build:
      context: ./incidentService
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/support_desk
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      GRPC_TARGET_HOST: user-service
      GRPC_TARGET_PORT: 9090
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/support-desk
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - support-desk-net

  notification-service:
    container_name: support-desk-notification-service
    build:
      context: ./notificationService
    restart: unless-stopped
    environment:
      SERVER_PORT: 8083
      DATASOURCE_URL: jdbc:postgresql://postgres:5432/support_desk
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      GRPC_TARGET_HOST: user-service
      GRPC_TARGET_PORT: 9090
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - support-desk-net

volumes:
  postgres_data:
  minio_data:

networks:
  support-desk-net:
    driver: bridge