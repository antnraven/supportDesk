server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: userService

  datasource:
    url: ${DATASOURCE_URL}
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 100

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/support-desk}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}