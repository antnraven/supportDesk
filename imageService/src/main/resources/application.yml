server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: imageService

  datasource:
    url: ${DATASOURCE_URL}
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/support-desk}

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${ACCESS_KEY}
  secret-key: ${SECRET_KEY}
  bucket-name: images

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}