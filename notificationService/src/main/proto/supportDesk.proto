syntax = "proto3";

import "google/protobuf/empty.proto";

option java_multiple_files = true;
option java_package = "com.example.grpc.generated";
option java_outer_classname = "UserImageServiceProto";

package userimage;

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  ANALYST = 1;
  INITIATOR = 2;
  ADMIN = 3;
}

message Image {
  int64 id = 1;
  int64 incidentId = 2;
  string url = 3;
  string fileName = 4;
  int64 size = 5;
  string mediaType = 6;
}

message User {
  int64 id = 1;
  UserRole role = 2;
  string userFullname = 3;
  string userLogin = 4;
  string phoneNumber = 5;
  string email = 6;
  string workplace = 7;
}

message GetImagesByIdRequest {
  int64 id = 1;
}

message GetUserByAnalystIdRequest {
  int64 analystId = 1;
}

message GetUserByInitiatorIdRequest {
  int64 initiatorId = 1;
}

message GetImagesResponse {
  repeated Image images = 1;
}

message GetUserResponse {
  User user = 1;
}

message GetUsersResponse {
  repeated User user = 1;
}

service UserImageService {
  rpc getImagesById (GetImagesByIdRequest) returns (GetImagesResponse);
  rpc getUserByAnalystId (GetUserByAnalystIdRequest) returns (GetUserResponse);
  rpc getUserByInitiatorId (GetUserByInitiatorIdRequest) returns (GetUserResponse);
  rpc getAllUsers (google.protobuf.Empty) returns (GetUserResponse);
}