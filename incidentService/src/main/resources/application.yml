server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: incidentService

  datasource:
    url: ${DATASOURCE_URL}
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.LongSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.value.default.type: com.example.incident.dto.IncidentDto

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/support-desk}

grpc:
  client:
    user-image-service:
      address: static://${GRPC_TARGET_HOST:localhost}:${GRPC_TARGET_PORT:9090}
      enableKeepAlive: true
      keepAliveWithoutCalls: true